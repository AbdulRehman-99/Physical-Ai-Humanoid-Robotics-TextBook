<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" fill="white"/>
  <g transform="translate(8, 6)">
    <!-- Robot head -->
    <rect x="3" y="2" width="10" height="8" rx="2" fill="url(#robotGradient)"/>
    <!-- Eyes -->
    <circle cx="6" cy="5" r="1" fill="white"/>
    <circle cx="10" cy="5" r="1" fill="white"/>
    <!-- Antenna -->
    <line x1="8" y1="2" x2="8" y2="0" stroke="#2563eb" stroke-width="1"/>
    <circle cx="8" cy="0" r="1" fill="#f59e0b"/>
    <!-- Body -->
    <rect x="4" y="10" width="8" height="8" rx="1" fill="#64748b"/>
    <!-- Arms -->
    <line x1="2" y1="12" x2="4" y2="12" stroke="#64748b" stroke-width="2"/>
    <line x1="14" y1="12" x2="16" y2="12" stroke="url(#robotGradient)" stroke-width="2"/>
    <!-- Legs -->
    <line x1="6" y1="18" x2="6" y2="22" stroke="#475569" stroke-width="2"/>
    <line x1="10" y1="18" x2="10" y2="22" stroke="url(#robotGradient)" stroke-width="2"/>
  </g>
</svg>