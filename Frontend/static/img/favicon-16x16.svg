<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="16" height="16" fill="white"/>
  <g transform="translate(4, 3)">
    <!-- Simplified robot icon -->
    <rect x="1" y="1" width="6" height="4" rx="1" fill="url(#robotGradient)"/>
    <!-- Eye -->
    <circle cx="3" cy="3" r="0.5" fill="white"/>
    <!-- Body -->
    <rect x="2" y="5" width="4" height="4" rx="0.5" fill="#64748b"/>
    <!-- Legs -->
    <rect x="2.5" y="9" width="1" height="2" fill="#475569"/>
    <rect x="4.5" y="9" width="1" height="2" fill="url(#robotGradient)"/>
  </g>
</svg>