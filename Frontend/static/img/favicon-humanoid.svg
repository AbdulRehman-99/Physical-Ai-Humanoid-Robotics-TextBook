<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <g fill="none" fill-rule="evenodd">
    <!-- Head -->
    <circle cx="8" cy="4.5" r="2" fill="url(#headGradient)"/>

    <!-- Eyes -->
    <circle cx="7" cy="4" r="0.5" fill="white"/>
    <circle cx="9" cy="4" r="0.5" fill="white"/>

    <!-- Body -->
    <rect x="6" y="6.5" width="4" height="5" rx="1" fill="url(#bodyGradient)"/>

    <!-- Arms -->
    <line x1="5" y1="7.5" x2="3" y2="8.5" stroke="url(#bodyGradient)" stroke-width="0.8"/>
    <line x1="11" y1="7.5" x2="13" y2="8.5" stroke="url(#headGradient)" stroke-width="0.8"/>

    <!-- Legs -->
    <line x1="6.5" y1="11.5" x2="6.5" y2="14" stroke="url(#bodyGradient)" stroke-width="0.8"/>
    <line x1="9.5" y1="11.5" x2="9.5" y2="14" stroke="url(#headGradient)" stroke-width="0.8"/>

    <!-- Antenna -->
    <line x1="8" y1="2.5" x2="8" y2="1.5" stroke="url(#headGradient)" stroke-width="0.6"/>
    <circle cx="8" cy="1.2" r="0.3" fill="url(#headGradient)"/>
  </g>
</svg>