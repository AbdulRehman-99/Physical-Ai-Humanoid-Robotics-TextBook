<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
  </defs>
  <g fill="none" fill-rule="evenodd">
    <!-- Book cover -->
    <rect x="40" y="30" width="120" height="140" rx="10" fill="url(#bookGradient)"/>

    <!-- Book spine -->
    <rect x="30" y="30" width="10" height="140" rx="2" fill="#1e40af"/>

    <!-- Book pages -->
    <rect x="45" y="40" width="110" height="120" rx="5" fill="url(#pageGradient)"/>

    <!-- Page content lines -->
    <g stroke="#2563eb" stroke-width="2" stroke-linecap="round">
      <line x1="55" y1="55" x2="135" y2="55"/>
      <line x1="55" y1="65" x2="125" y2="65"/>
      <line x1="55" y1="75" x2="135" y2="75"/>
      <line x1="55" y1="85" x2="115" y2="85"/>
      <line x1="55" y1="95" x2="135" y2="95"/>
      <line x1="55" y1="105" x2="125" y2="105"/>
      <line x1="55" y1="115" x2="135" y2="115"/>
      <line x1="55" y1="125" x2="115" y2="125"/>
      <line x1="55" y1="135" x2="135" y2="135"/>
    </g>

    <!-- Robot symbol on book -->
    <g transform="translate(75, 140) scale(0.8)">
      <!-- Head -->
      <rect x="10" y="5" width="15" height="12" rx="3" fill="#2563eb" opacity="0.8"/>
      <!-- Eyes -->
      <circle cx="14" cy="10" r="1.5" fill="white"/>
      <circle cx="20" cy="10" r="1.5" fill="white"/>
      <!-- Body -->
      <rect x="12" y="17" width="11" height="10" rx="2" fill="#64748b" opacity="0.8"/>
      <!-- Antenna -->
      <line x1="17" y1="5" x2="17" y2="2" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="17" cy="1" r="1" fill="#f59e0b"/>
    </g>

    <!-- Book title text placeholder -->
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif"
          font-size="12" fill="white" font-weight="bold">AI ROBOTICS</text>
  </g>
</svg>