name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Split backend folder into separate branch
        run: |
          git subtree split --prefix Backend -b hf-deploy-branch

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Abdul-Rehman-99:$HF_TOKEN@huggingface.co/spaces/Abdul-Rehman-99/Textbook hf-deploy-branch:main --force